---
- name: Deploy FSL Client to Raspberry Pis
  hosts: clients
  become: true
  serial: 1  # Pull one Pi at a time to avoid Docker Hub rate limiting

  tasks:
    - name: Ensure directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /home/pi/dataset/processed
        - /home/pi/results
        - /home/pi/bestweights

    - name: Synchronize dataset from Mac to Pis (this may take a few mins)
      ansible.posix.synchronize:
        src: ../dataset/processed/
        dest: /home/pi/dataset/processed/
        archive: true
        compress: true
        rsync_opts:
          - "--ignore-existing"  # Only upload missing files to save time

    - name: Sync config.yaml to Pi
      ansible.posix.synchronize:
        src: ../config.yaml
        dest: /home/pi/config.yaml
        archive: false
        checksum: true

    - name: Pull FSL client image
      community.docker.docker_image:
        name: "{{ client_image }}"
        source: pull

    - name: Remove old fsl-client container (if exists)
      community.docker.docker_container:
        name: fsl-client
        state: absent

    - name: Start fsl-client container
      community.docker.docker_container:
        name: fsl-client
        image: "{{ client_image }}"
        state: started
        restart_policy: "no"
        command: python src/nodes/run_scenario_loop.py --role client
        env:
          CLIENT_ID: "{{ client_id | string }}"
          SESSION_ID: "{{ session_id | default('') }}"
          SCENARIO_ID: "{{ scenario_id | default('') }}"
          FSL_SERVER_HOST: "{{ server_host }}"
          FSL_CONFIG_PATH: /app/config.yaml
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: /app
          FSL_DEVICE: cpu
        volumes:
          - /home/pi/config.yaml:/app/config.yaml:ro
          - /home/pi/dataset/processed:/app/dataset/processed:ro
          - /home/pi/results:/app/results
          - /home/pi/bestweights:/app/bestweights

    - name: Show container status
      ansible.builtin.command: docker ps --filter name=fsl-client
      register: container_status
      changed_when: false

    - name: Print container status
      ansible.builtin.debug:
        msg: "{{ container_status.stdout_lines }}"
