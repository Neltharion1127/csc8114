compression:
  mode: float32
  topk_ratio: 0.5
console:
  log_step_details: false
  log_server_requests: false
data:
  processed_dir: dataset/processed
  test_days: 14
  val_days: 14
  train_ratio: 0.7
  val_ratio: 0.15
  # Feature columns consumed by model/data pipeline (preferred location)
  feature_cols:
    - Temperature
    - Humidity
    - Pressure
    - Wind Speed
    - Rain
federated:
  num_clients: 3
  rho: 1
grpc:
  max_message_mb: 50
  server_host: fsl-server
  # server_host: localhost
  server_port: 50051
model:
  dropout: 0.3
  hidden_size: 64
  server_head_width: 64
  server_head_dropout: 0.1
  horizon: 1
  input_size: 5
  num_layers: 2
  seq_len: 24
output:
  metrics_dir: /app/outputs/metrics
  plots_dir: /app/outputs/plots
profiler:
  enabled: true
  latency_generator:
    base_latency_ms: 1.5
    client_offsets_ms: [0.0, 4.0, 9.0]
    jitter_ms: 0.8
    burst_every_steps: 0
    burst_latency_ms: 0.0
    sleep_fraction: 0.0
    max_sleep_ms: 0.0
    measured_floor_ratio: 0.25
scheduler:
  enabled: true
  latency_threshold: 4.0
  int8_latency_threshold: 10.0
  max_rho: 20
  min_rho: 1
  rho_step: 1
  topk_multiplier: 1.5
  latency_ema_alpha: 0.2
experiment_matrix:
  enabled: false
  seeds: [42, 52, 62]
  runner:
    backend: native
    server_device: cpu
    client_device: cpu
    eval_device: cpu
    startup_timeout: 120
    summary_csv: results/matrix_summary.csv
  scenarios:
    - id: M01
      description: P0+S0 no-latency baseline (static float32, rho=1)
      overrides:
        profiler:
          enabled: false
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M02
      description: P0+S3 no-latency with adaptive scheduler
      overrides:
        profiler:
          enabled: false
        scheduler:
          enabled: true
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M03
      description: P1+S0 light latency, static float32
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 1.5
            client_offsets_ms: [0.0, 4.0, 9.0]
            jitter_ms: 0.8
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M04
      description: P1+S3 light latency with adaptive scheduler
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 1.5
            client_offsets_ms: [0.0, 4.0, 9.0]
            jitter_ms: 0.8
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: true
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M05
      description: P2+S0 medium latency, static float32
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M06
      description: P2+S1 medium latency, static int8
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: int8
        federated:
          rho: 1
    - id: M07
      description: P2+S2 medium latency, static topk
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: topk
          topk_ratio: 0.5
        federated:
          rho: 1
    - id: M08
      description: P2+S5 medium latency, static float32 with rho=3
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 3
    - id: M09
      description: P2+S4 medium latency, adaptive compression only (rho fixed at 1)
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: true
          min_rho: 1
          max_rho: 1
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M10
      description: P2+S3 medium latency with adaptive scheduler
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: true
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M11
      description: P3+S0 burst latency, static float32
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 50
            burst_latency_ms: 20.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1
    - id: M12
      description: P3+S3 burst latency with adaptive scheduler
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 3.0
            client_offsets_ms: [0.0, 8.0, 14.0]
            jitter_ms: 1.2
            burst_every_steps: 50
            burst_latency_ms: 20.0
        scheduler:
          enabled: true
        compression:
          mode: float32
        federated:
          rho: 1
training:
  seed: 42
  batch_size: 32
  classification_loss_weight: 2.0
  classification_positive_weight: 1.1
  classification_loss_type: focal # weighted_bce | focal
  focal_gamma: 2.0
  focal_alpha: 0.25 # [0,1] to enable alpha balancing; negative means disabled
  rain_threshold_mm: 0.1
  rain_probability_threshold: 0.34
  local_steps: 10
  lr: 0.0005
  num_rounds: 30
  rain_sample_ratio: 0.15
  regression_loss_weight: 1.0
  target_transform: log1p
  start_delay: 8
  device: auto  # auto | cuda | mps | cpu
  mixed_precision: auto  # none | auto | bf16
  use_gpu: true # legacy switch (kept for backward compatibility)
  checkpoint_interval: 1  # Save a periodic checkpoint every N rounds
  early_stopping_patience: 10
  eval_max_samples_per_sensor: 0
server:
  log_flush_interval: 1000
  max_workers: 10

data_download:
  start_date: "2023-01-01T00:00:00"
  end_date: "2026-3-10T00:00:00"      # up to today
  # Legacy location kept for backward compatibility (new code prefers data.feature_cols)
  feature_cols:
    - Temperature
    - Humidity
    - Pressure
    - Wind Speed
    - Rain
  # Spatial bounding box for Newcastle: [min_lon, min_lat, max_lon, max_lat]
  # bbox: [-1.71, 54.95, -1.54, 55.03]
  # Data download window settings
  raw_out_dir: dataset
  raw_filename: newcastle_rainfall_data.csv

