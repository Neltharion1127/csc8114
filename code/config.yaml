compression:
  mode: float32
  topk_ratio: 0.5
data:
  processed_dir: dataset/processed
  test_days: 14
  train_ratio: 0.7
  val_ratio: 0.15
federated:
  num_clients: 3
  rho: 1
grpc:
  max_message_mb: 50
  server_host: fsl-server
  # server_host: localhost
  server_port: 50051
model:
  dropout: 0.3
  hidden_size: 64
  horizon: 1
  input_size: 5
  num_layers: 2
  seq_len: 24
output:
  metrics_dir: /app/outputs/metrics
  plots_dir: /app/outputs/plots
scheduler:
  latency_threshold: 1.0
  max_rho: 20
  min_rho: 1
training:
  batch_size: 32
  local_steps: 10
  lr: 0.0005
  num_rounds: 100
  start_delay: 8
  use_gpu: true # Set to True to enable MPS GPU acceleration on Mac
  checkpoint_interval: 10  # Save a periodic checkpoint every N rounds
  early_stopping_patience: 30
server:
  max_workers: 10

data_download:
  start_date: "2025-01-01T00:00:00"   # 1 full year of data
  end_date: "2026-03-10T00:00:00"      # up to today
  # Feature columns used by the model/data pipeline
  feature_cols:
    - Temperature
    - Humidity
    - Pressure
    - Wind Speed
    - Rain
  # Spatial bounding box for Newcastle: [min_lon, min_lat, max_lon, max_lat]
  # bbox: [-1.71, 54.95, -1.54, 55.03]
  # Data download window settings
  raw_out_dir: dataset
  raw_filename: newcastle_rainfall_data.csv