compression:
  mode: float32
  topk_ratio: 0.5
console:
  log_step_details: false
  log_server_requests: false
artifacts:
  # none|minimal|full: controls checkpoint/meta config payload size.
  config_snapshot_policy: minimal
data:
  processed_dir: dataset/processed
  # Monthly cyclic splitting
  train_days: 20
  val_days: 5
  # test_days: Remaining days of the month
  # Feature columns consumed by model/data pipeline (preferred location)
  feature_cols:
    - Temperature
    - Humidity
    - Pressure
    - Wind Speed
    - Rain
federated:
  num_clients: 11
  min_clients_per_round: 9
  # 12 parquet files: client 1-10 get 1 file each; last client gets remaining files
  rho: 1
  # How long the server barrier waits for all active clients to submit weights.
  # 15s was fine for local Docker; real Pi → VPS latency needs a much larger window.
  round_timeout_sec: 120
  # After quorum is reached, wait this many extra seconds for stragglers before aggregating.
  # Set to 0 to aggregate immediately upon quorum.
  grace_period_sec: 20
grpc:
  max_message_mb: 50
  server_host: fsl-server
  # server_host: localhost
  server_port: 50051
  # TLS: set tls_enabled: true and provide cert/key paths for encrypted transport.
  # When running over Tailscale the WireGuard layer already encrypts traffic,
  # so tls_enabled: false is acceptable for that topology.
  tls_enabled: false
  # tls_cert_path: /app/certs/server.crt   # server + client (CA cert)
  # tls_key_path:  /app/certs/server.key   # server only
model:
  lstm_dropout: 0.3
  hidden_size: 64
  server_head_width: 64
  server_head_dropout: 0.1
  horizon: 24
  input_size: 5
  num_layers: 2
  seq_len: 48
# output:
#   metrics_dir: /app/outputs/metrics  # unused (runtime writes to results/)
#   plots_dir: /app/outputs/plots      # unused (runtime writes to results/)
profiler:
  enabled: true
  latency_generator:
    base_latency_ms: 1.5
    client_offsets_ms: [0.0, 4.0, 9.0]
    jitter_ms: 0.8
    burst_every_steps: 0
    burst_latency_ms: 0.0
    sleep_fraction: 0.0
    max_sleep_ms: 0.0
    measured_floor_ratio: 0.25
scheduler:
  enabled: true
  latency_threshold: 4.0
  int8_latency_threshold: 10.0
  max_rho: 20
  min_rho: 1
  rho_step: 1
  topk_multiplier: 1.5
  latency_ema_alpha: 0.2
experiment_matrix:
  # 3 latency profiles × 5 strategies = 15 scenarios × 2 seeds = 30 runs
  # Latency ranges calibrated against Mao et al. 2017 (MEC survey):
  #   Low  (~2ms):  WiFi/LAN edge deployment
  #   Mid  (~8ms):  4G cellular MEC link
  #   High (~50ms): NB-IoT / wide-area IoT
  # Scheduler thresholds: float16@4ms, int8@10ms, topk@15ms
  # Strategy axes (clean ablation):
  #   S0: float32, rho=1, no scheduler  (baseline)
  #   S1: float16, rho=1, no scheduler  (compression only - tier 1)
  #   S2: int8,    rho=1, no scheduler  (compression only - tier 2)
  #   S3: float32, rho=3, no scheduler  (sync interval only)
  #   S4: float32, rho=dynamic, adaptive scheduler (joint adaptation)
  seeds: [42, 52, 62]
  runner:
    backend: native
    server_device: cpu
    client_device: cpu
    eval_device: cpu
    startup_timeout: 120
    summary_csv: results/matrix_summary.csv
  scenarios:
    # ── No latency (profiler off — clean baseline, no floor interference) ─
    - id: "01"
      description: "No latency | S0 baseline (float32, rho=1, no scheduler)"
      overrides:
        profiler:
          enabled: false
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1

    - id: "02"
      description: "No latency | S1 float16 compression only"
      overrides:
        profiler:
          enabled: false
        scheduler:
          enabled: false
        compression:
          mode: float16
        federated:
          rho: 1

    - id: "03"
      description: "No latency | S2 int8 compression only"
      overrides:
        profiler:
          enabled: false
        scheduler:
          enabled: false
        compression:
          mode: int8
        federated:
          rho: 1

    - id: "04"
      description: "No latency | S3 sync interval only (float32, rho=3)"
      overrides:
        profiler:
          enabled: false
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 3

    # ── Mid latency (~8ms base) ──────────────────────────────────────────
    - id: "05"
      description: "Mid latency | S0 baseline (float32, rho=1, no scheduler)"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 8.0
            # offsets span float16 zone (8-9ms) to int8 zone (10-14ms)
            # clients 1-4: ~8-9ms → float16; clients 5-11: ~10-14ms → int8
            client_offsets_ms: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
            jitter_ms: 1.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1

    - id: "06"
      description: "Mid latency | S1 float16 compression only"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 8.0
            client_offsets_ms: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
            jitter_ms: 1.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float16
        federated:
          rho: 1

    - id: "07"
      description: "Mid latency | S2 int8 compression only"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 8.0
            client_offsets_ms: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
            jitter_ms: 1.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: int8
        federated:
          rho: 1

    - id: "08"
      description: "Mid latency | S3 sync interval only (float32, rho=3)"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 8.0
            client_offsets_ms: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
            jitter_ms: 1.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 3

    - id: "09"
      description: "Mid latency | S4 adaptive scheduler"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 8.0
            client_offsets_ms: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
            jitter_ms: 1.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: true
        compression:
          mode: float32
        federated:
          rho: 1

    # ── High latency (~50ms base) ────────────────────────────────────────
    - id: "10"
      description: "High latency | S0 baseline (float32, rho=1, no scheduler)"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 50.0
            # all clients 50-80ms → all exceed topk threshold (15ms), scheduler assigns topk/rho=4
            client_offsets_ms: [0.0, 2.0, 4.0, 6.0, 8.0, 12.0, 15.0, 18.0, 22.0, 26.0, 30.0]
            jitter_ms: 5.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 1

    - id: "11"
      description: "High latency | S1 float16 compression only"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 50.0
            client_offsets_ms: [0.0, 2.0, 4.0, 6.0, 8.0, 12.0, 15.0, 18.0, 22.0, 26.0, 30.0]
            jitter_ms: 5.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float16
        federated:
          rho: 1

    - id: "12"
      description: "High latency | S2 int8 compression only"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 50.0
            client_offsets_ms: [0.0, 2.0, 4.0, 6.0, 8.0, 12.0, 15.0, 18.0, 22.0, 26.0, 30.0]
            jitter_ms: 5.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: int8
        federated:
          rho: 1

    - id: "13"
      description: "High latency | S3 sync interval only (float32, rho=3)"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 50.0
            client_offsets_ms: [0.0, 2.0, 4.0, 6.0, 8.0, 12.0, 15.0, 18.0, 22.0, 26.0, 30.0]
            jitter_ms: 5.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: false
        compression:
          mode: float32
        federated:
          rho: 3

    - id: "14"
      description: "High latency | S4 adaptive scheduler"
      overrides:
        profiler:
          enabled: true
          latency_generator:
            base_latency_ms: 50.0
            client_offsets_ms: [0.0, 2.0, 4.0, 6.0, 8.0, 12.0, 15.0, 18.0, 22.0, 26.0, 30.0]
            jitter_ms: 5.0
            burst_every_steps: 0
            burst_latency_ms: 0.0
        scheduler:
          enabled: true
        compression:
          mode: float32
        federated:
          rho: 1
training:
  seed: 42
  # batch_size: 32  # unused (main training loop is step-based RPC, not DataLoader batch training)
  classification_loss_weight: 2.0
  classification_positive_weight: 1.1
  classification_loss_type: focal # weighted_bce | focal
  focal_gamma: 2.0
  focal_alpha: 0.25 # [0,1] to enable alpha balancing; negative means disabled
  rain_threshold_mm: 0.1
  rain_probability_threshold: 0.34
  local_steps: 10
  lr: 0.0005
  num_rounds: 30
  rain_sample_ratio: 0.15
  regression_loss_weight: 1.0
  target_transform: log1p
  start_delay: 8
  device: auto  # auto | cuda | mps | cpu
  mixed_precision: auto  # none | auto | bf16
  use_gpu: true # legacy switch (kept for backward compatibility)
  checkpoint_interval: 1  # Save a periodic checkpoint every N rounds
  early_stopping_patience: 30
  eval_max_samples_per_sensor: 0
server:
  log_flush_interval: 1000
  max_workers: 10

data_download:
  start_date: "2023-01-01T00:00:00"
  end_date: "2026-03-31T00:00:00"
  # Legacy location kept for backward compatibility (new code prefers data.feature_cols)
  feature_cols:
    - Temperature
    - Humidity
    - Pressure
    - Wind Speed
    - Rain
  # Spatial bounding box for Newcastle: [min_lon, min_lat, max_lon, max_lat]
  # bbox: [-1.71, 54.95, -1.54, 55.03]
  # Data download window settings
  raw_out_dir: dataset
  # raw_filename: newcastle_rainfall_data.csv  # unused
