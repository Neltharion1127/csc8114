compression:
  mode: float32
  topk_ratio: 0.5
data:
  csv_path: /app/data/rainfall.csv
  processed_dir: dataset/processed
  sensor_split:
    '0': []
    '1': []
    '2': []
  train_ratio: 0.7
  val_ratio: 0.15
federated:
  num_clients: 3
  rho: 1
grpc:
  max_message_mb: 50
  server_host: fsl-server
  #server_host: localhost
  server_port: 50051
model:
  dropout: 0.1
  hidden_size: 64
  horizon: 1
  input_size: 5
  num_layers: 2
  seq_len: 24
output:
  metrics_dir: /app/outputs/metrics
  plots_dir: /app/outputs/plots
scheduler:
  latency_threshold: 1.0
  max_rho: 20
  min_rho: 1
training:
  batch_size: 32
  local_steps: 10
  lr: 0.001
  num_rounds: 100
  start_delay: 8

server:
  max_workers: 10
