name: Deploy Clients (Pi)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or latest)"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH key for Pi access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Trust all Pi host keys via Tailscale (avoids interactive prompts)
          ssh-keyscan -H \
            100.125.109.94 100.107.116.47 100.97.168.37  100.70.88.79  100.124.53.49 \
            100.74.7.121   100.89.254.57  100.113.200.123 100.75.171.87 100.94.18.24 \
            100.98.233.96 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy image to all Pis
        run: |
          ansible-playbook ansible/deploy_client.yml \
            -i ansible/inventory.taisale.ini \
            --extra-vars "image_tag=${{ inputs.image_tag }}"
