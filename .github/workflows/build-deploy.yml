name: Build & Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "code/src/**"
      - "code/proto/**"
      - "code/config.yaml"
      - "code/pyproject.toml"
      - "code/Dockerfile"

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: code
          file: code/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            cindyncl26/fsl-client:latest
            cindyncl26/fsl-client:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-server:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy server to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE="cindyncl26/fsl-client:${{ needs.build-push.outputs.image_tag }}"
            echo "Pulling $IMAGE ..."
            docker pull $IMAGE

            docker stop fsl-server 2>/dev/null || true
            docker rm   fsl-server 2>/dev/null || true

            docker run -d \
              --name fsl-server \
              --restart unless-stopped \
              -p 50051:50051 \
              -e PYTHONUNBUFFERED=1 \
              -e PYTHONPATH=/app \
              -e FSL_DEVICE=cpu \
              -v /home/${{ secrets.VPS_SSH_USER }}/bestweights:/app/bestweights \
              -v /home/${{ secrets.VPS_SSH_USER }}/results:/app/results \
              $IMAGE \
              python src/nodes/server_node.py

            echo "Server started with image $IMAGE"
